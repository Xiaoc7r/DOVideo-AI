server.port=${SERVER_PORT:9090}
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

# Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3307/media_db?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN_IDLE:2}
spring.datasource.hikari.connection-timeout=3000
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.slf4j.Slf4jImpl

# Upload
spring.servlet.multipart.max-file-size=2048MB
spring.servlet.multipart.max-request-size=2048MB

# Model gateway
ai.deepseek.api-key=${SILICONFLOW_API_KEY}
ai.deepseek.base-url=${SILICONFLOW_BASE_URL:https://api.siliconflow.cn/v1}
ai.deepseek.model=${LLM_MODEL:deepseek-ai/DeepSeek-R1-Distill-Qwen-32B}
ai.deepseek.input-price-per-million=${LLM_INPUT_PRICE_PER_MILLION:0}
ai.deepseek.output-price-per-million=${LLM_OUTPUT_PRICE_PER_MILLION:0}
ai.embedding.model=${EMBEDDING_MODEL:BAAI/bge-m3}
ai.asr.url=${ASR_URL:https://api.siliconflow.cn/v1/audio/transcriptions}
ai.asr.model=${ASR_MODEL:TeleAI/TeleSpeechASR}

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.database=${REDIS_DATABASE:0}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=3000ms

# MinIO
minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
minio.accessKey=${MINIO_ACCESS_KEY}
minio.secretKey=${MINIO_SECRET_KEY}
minio.bucketName=${MINIO_BUCKET:media}
minio.public-read=${MINIO_PUBLIC_READ:false}

# Local media tools
tool.ytdlp.path=${YTDLP_PATH:yt-dlp}
tool.ffmpeg.dir=${FFMPEG_DIR:}
tool.ocr.command=${OCR_COMMAND:tesseract}

# RocketMQ
rocketmq.name-server=${ROCKETMQ_NAME_SERVER:127.0.0.1:9876}
rocketmq.producer.group=${ROCKETMQ_PRODUCER_GROUP:video-analysis-producer}
rocketmq.producer.send-message-timeout=3000
rocketmq.topic.video-analysis=${ROCKETMQ_ANALYSIS_TOPIC:video-analysis-topic}
rocketmq.consumer.group=${ROCKETMQ_ANALYSIS_GROUP:video-analysis-consumer}
